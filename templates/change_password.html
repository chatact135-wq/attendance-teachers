{% extends 'base.html' %}
{% block content %}
<section class="card narrow-card">
  <h1>Change My Password</h1>
  <p class="muted">Enter your old password, then choose a new password.</p>
  <form method="post">
    <label>Old Password</label>
    <input name="old_password" type="password" required autocomplete="current-password">

    <label>New Password</label>
    <input name="new_password" type="password" required minlength="8" autocomplete="new-password">

    <label>Confirm New Password</label>
    <input name="confirm_password" type="password" required minlength="8" autocomplete="new-password">

    <button class="primary" type="submit">Change Password</button>
  </form>
</section>
{% endblock %}
